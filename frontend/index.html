<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Zene Ajánló</title>
  <style>
    body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
    #result { font-weight: bold; margin-top: 20px; color: #2c3e50; }
  </style>
</head>
<body>

  <h1>Zene ajánló műfaj alapján</h1>

  <label for="genreSelect">Válassz egy stílust:</label>
  <select id="genreSelect">
    <option value="">-- Műfajok --</option>
    <option value="pop">Pop</option>
    <option value="rock">Rock</option>
    <option value="jazz">Jazz</option>
    <option value="techno">Techno</option>
    <option value="classical">Komolyzene</option>
  </select>

  <p id="result"></p>

  <script>
    
    const select = document.getElementById("genreSelect");
    const result = document.getElementById("result");

    select.addEventListener("change", async () => {
      // Itt definiálod a 'genre' változót
      const genre = select.value; 

      if (!genre) {
        result.innerText = "";
        return;
      }

      try {
        // HIBA VOLT: Itt valószínűleg ${year} maradt a ${genre} helyett
        const res = await fetch(`http://api-k8s-beadando-csongetocsongor.jcloud.jedlik.cloud/music/${genre}`);
        const data = await res.json();

        if (data.error) {
          result.innerText = "Hiba: " + data.error;
        } else {
          // HIBA VOLT: Itt is ${data.genre}-t kell használni a ${data.year} helyett
          result.innerText = `A választott műfaj (${data.genre}) egyik alapműve: ${data.track}`;
        }
      } catch (err) {
        result.innerText = "Nem sikerült elérni a szervert.";
      }
    });
      </script>

</body>
</html>
